@if (open()) {
  <div class="fixed inset-0 z-50 flex items-center justify-center bg-black/40 p-4" (click)="close()">
    <div class="card w-full max-w-md" (click)="$event.stopPropagation()">
      <div class="flex items-center justify-between mb-3">
        <h3 class="text-h3">{{ (isEdit() ? 'Edit team member' : 'Add team member') | translate }}</h3>
        <button class="text-ink-mid hover:text-danger" (click)="close()"><i class="ti ti-x"></i></button>
      </div>

      <form [formGroup]="form" (ngSubmit)="submit()" class="flex flex-col gap-3">
        <label class="flex flex-col gap-1">
          <span class="text-caption font-medium">{{ 'Name' | translate }}</span>
          <input formControlName="name" class="rounded-md border-ink-light py-1.5" />
        </label>

        <div class="grid grid-cols-2 gap-3">
          <label class="flex flex-col gap-1">
            <span class="text-caption font-medium">{{ 'Email' | translate }}</span>
            <input formControlName="email" type="email" class="rounded-md border-ink-light py-1.5 disabled:bg-shell" />
          </label>
          <label class="flex flex-col gap-1">
            <span class="text-caption font-medium">{{ 'Mobile' | translate }}</span>
            <roc-mobile-input formControlName="mobile" />
            @if (form.controls.mobile.touched && form.controls.mobile.invalid) {
              <span class="text-micro text-danger">{{ 'Enter a 10-digit mobile number.' | translate }}</span>
            }
          </label>
        </div>

        <label class="flex flex-col gap-1">
          <span class="text-caption font-medium">{{ 'Role' | translate }}</span>
          <select formControlName="roleId" class="rounded-md border-ink-light py-1.5">
            <option value="">{{ 'Select a role…' | translate }}</option>
            @for (r of selectableRoles(); track r.id) { <option [value]="r.id">{{ r.name }}</option> }
          </select>
          @if (!roles().length) { <span class="text-caption text-ink-mid">{{ 'No roles loaded (requires Roles.Manage).' | translate }}</span> }
        </label>

        @if (isEdit()) {
          <label class="flex items-center gap-2 text-body">
            <input type="checkbox" formControlName="isActive" class="rounded border-ink-light" /> {{ 'Active' | translate }}
          </label>
        } @else {
          <label class="flex flex-col gap-1">
            <span class="text-caption font-medium">{{ 'Preferred language' | translate }}</span>
            <select formControlName="preferredLanguage" class="rounded-md border-ink-light py-1.5">
              @for (l of languages; track l.code) { <option [value]="l.code">{{ l.label }}</option> }
            </select>
          </label>
          <label class="flex items-center gap-2 text-body">
            <input type="checkbox" [checked]="sendInvite()" (change)="sendInvite.set($any($event.target).checked)" class="rounded border-ink-light" />
            {{ 'Send portal invitation email (otherwise a temporary password is emailed)' | translate }}
          </label>
        }

        <div class="flex justify-end gap-2 pt-1">
          <button type="button" class="btn-secondary" (click)="close()">{{ 'Cancel' | translate }}</button>
          <button type="submit" class="btn-primary" [disabled]="saving()">
            @if (saving()) { <i class="ti ti-loader-2 animate-spin"></i> } @else { {{ (isEdit() ? 'Save' : sendInvite() ? 'Send invite' : 'Create') | translate }} }
          </button>
        </div>
      </form>
    </div>
  </div>
}
