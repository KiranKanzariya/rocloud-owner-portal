<div class="flex flex-col gap-4">
  <div class="flex items-center justify-between">
    <h1 class="text-h1">{{ 'Products' | translate }}</h1>
    @if (canManage) {
      <button class="btn-primary" (click)="openCreate()"><i class="ti ti-plus"></i> {{ 'Add product' | translate }}</button>
    }
  </div>

  <roc-data-table
    [columns]="columns" [rows]="rows()" [totalCount]="totalCount()" [loading]="loading()"
    [page]="page()" [pageSize]="pageSize" [sortBy]="sortBy()" [sortDir]="sortDir()"
    (sortChange)="onSort($event)" (pageChange)="onPage($event)">

    <ng-template appColumnCell="name" let-row><span class="font-medium text-ink">{{ row.name }}</span></ng-template>
    <ng-template appColumnCell="bottleSize" let-row><span [class]="row.bottleSize === '20L' ? 'bottle-20l' : 'bottle-18l'">{{ row.bottleSize }}</span></ng-template>
    <ng-template appColumnCell="defaultRate" let-row><span class="font-mono">₹{{ row.defaultRate | number: '1.0-2' }}</span></ng-template>
    <ng-template appColumnCell="isActive" let-row>
      <span [class]="row.isActive ? 'status-delivered' : 'status-active-info'">{{ (row.isActive ? 'Active' : 'Inactive') | translate }}</span>
    </ng-template>
    <ng-template appColumnCell="actions" let-row>
      @if (canManage) {
        <div class="flex items-center justify-end gap-1">
          <button class="btn-icon" (click)="openEdit(row)" [title]="'Edit rate' | translate"><i class="ti ti-pencil"></i></button>
          <button class="btn-icon" [class.text-danger]="row.isActive" [class.text-teal]="!row.isActive"
            (click)="toggleActive(row)" [title]="(row.isActive ? 'Deactivate' : 'Activate') | translate">
            <i class="ti" [class.ti-toggle-right]="row.isActive" [class.ti-toggle-left]="!row.isActive"></i>
          </button>
        </div>
      }
    </ng-template>
  </roc-data-table>
</div>

@if (modalOpen()) {
  <div class="fixed inset-0 z-50 flex items-center justify-center bg-black/40 p-4" (click)="modalOpen.set(false)">
    <div class="card w-full max-w-sm" (click)="$event.stopPropagation()">
      <div class="flex items-center justify-between mb-3">
        <h3 class="text-h3">{{ (editingId() ? 'Edit product' : 'Add product') | translate }}</h3>
        <button class="btn-icon btn-icon-danger" (click)="modalOpen.set(false)"><i class="ti ti-x"></i></button>
      </div>
      <form [formGroup]="form" (ngSubmit)="save()" class="flex flex-col gap-3">
        <label class="flex flex-col gap-1">
          <span class="text-caption font-medium">{{ 'Name' | translate }}</span>
          <input formControlName="name" class="rounded-md border-ink-light py-1.5" [placeholder]="'e.g. 20L Jar' | translate" />
        </label>
        <div class="grid grid-cols-2 gap-3">
          <label class="flex flex-col gap-1">
            <span class="text-caption font-medium">{{ 'Size' | translate }}</span>
            <select formControlName="bottleSize" class="rounded-md border-ink-light py-1.5">
              @for (s of bottleSizes; track s) { <option [value]="s">{{ s }}</option> }
            </select>
          </label>
          <label class="flex flex-col gap-1">
            <span class="text-caption font-medium">{{ 'Rate (₹)' | translate }}</span>
            <input type="number" formControlName="defaultRate" class="rounded-md border-ink-light py-1.5" step="0.5" />
          </label>
        </div>
        <label class="flex flex-col gap-1">
          <span class="text-caption font-medium">{{ 'HSN / SAC code' | translate }} <span class="text-ink-mid font-normal">({{ 'Optional' | translate }})</span></span>
          <input formControlName="hsn" inputmode="numeric" maxlength="8" class="rounded-md border-ink-light py-1.5" placeholder="2201" />
          <span class="text-micro text-ink-mid">{{ 'Shown on GST tax invoices. Blank → 2201 (packaged water).' | translate }}</span>
        </label>
        <label class="flex items-center gap-2 text-body">
          <input type="checkbox" formControlName="isActive" class="rounded border-ink-light" /> {{ 'Active' | translate }}
        </label>
        <div class="flex justify-end gap-2 pt-1">
          <button type="button" class="btn-secondary" (click)="modalOpen.set(false)">{{ 'Cancel' | translate }}</button>
          <button type="submit" class="btn-primary" [disabled]="saving()">
            @if (saving()) { <i class="ti ti-loader-2 animate-spin"></i> } @else { {{ 'Save' | translate }} }
          </button>
        </div>
      </form>
    </div>
  </div>
}
